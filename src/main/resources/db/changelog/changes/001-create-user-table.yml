databaseChangeLog:
  - changeSet:
      id: 001-create-user-table
      author: Sss330
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    unique: false
                    nullable: false

              - column:
                  name: password
                  type: varchar(250)
                  constraints:
                    nullable: false

              - column:
                  name: email
                  type: varchar(200)
                  constraints:
                    unique: true
                    nullable: false

              - column:
                  name: role
                  type: varchar(50)
                  defaultValue: USER
                  constraints:
                    nullable: false

  - changeSet:
      id: 1783790318684-1
      author: yaroslav
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: last_name
                  type: varchar(100)
                  defaultValue: username
                  constraints:
                    nullable: false
  - changeSet:
      author: yaroslav
      id: 1783790534370-1
      changes:
        - renameColumn:
            tableName: users
            oldColumnName: name
            newColumnName: first_name
