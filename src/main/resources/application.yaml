server:
  port: ${USER_SERVICE_PORT:8081}
  servlet:
    context-path: /api/user-service

spring:
  application:
    name: user-service

  liquibase:
    change-log: classpath:db/changelog/changelog-master.yml

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  profiles:
    active: dev

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET}
    expiration-ms: 3600000

springdoc:
  swagger-ui:
    disable-swagger-default-url: true
    url: /v3/api-docs
