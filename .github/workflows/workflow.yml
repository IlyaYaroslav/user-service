name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: user-service-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  IMAGE_NAME: ghcr.io/ilyayaroslav/user-service

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: users
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d users"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'

      - name: Run tests
        env:
          USER_SERVICE_PORT: 8081
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: users
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
          SECURITY_JWT_SECRET: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
        run: gradle clean test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test
          if-no-files-found: ignore

  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy user-service
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SECURITY_JWT_SECRET: ${{ secrets.SECURITY_JWT_SECRET }}
        run: |
          set -euo pipefail
          trap 'rm -f .env.deploy' EXIT

          {
            printf 'IMAGE_NAME=%s\n' "${{ env.IMAGE_NAME }}:${{ github.sha }}"
            printf 'POSTGRES_HOST=%s\n' "${POSTGRES_HOST}"
            printf 'POSTGRES_PORT=%s\n' "${POSTGRES_PORT}"
            printf 'POSTGRES_DB=%s\n' "${POSTGRES_DB}"
            printf 'POSTGRES_USER=%s\n' "${POSTGRES_USER}"
            printf 'POSTGRES_PASSWORD=%s\n' "${POSTGRES_PASSWORD}"
            printf 'SECURITY_JWT_SECRET=%s\n' "${SECURITY_JWT_SECRET}"
          } > .env.deploy

          SSH=(ssh -i ~/.ssh/deploy_key -p "$VPS_PORT")
          SCP=(scp -i ~/.ssh/deploy_key -P "$VPS_PORT")
          TARGET="${VPS_USER}@${VPS_HOST}"

          "${SSH[@]}" "$TARGET" "mkdir -p ~/apps/user-service"
          "${SCP[@]}" docker-compose.yml .env.deploy "$TARGET:~/apps/user-service/"
          printf '%s' "$GHCR_TOKEN" | \
            "${SSH[@]}" "$TARGET" "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"

          "${SSH[@]}" "$TARGET" '
            set -e
            cd ~/apps/user-service
            docker network inspect taskspace-net >/dev/null 2>&1 || docker network create taskspace-net
            docker compose --env-file .env.deploy pull user-service
            docker compose --env-file .env.deploy up -d --force-recreate user-service
            docker image prune -f
            docker compose ps
          '
