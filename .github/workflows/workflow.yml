name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  JAVA_VERSION: '21'
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/ilyayaroslav/user-service

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: users
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d users"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'

      - name: Test
        run: gradle clean test --no-daemon
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/users
          SPRING_DATASOURCE_USERNAME: admin
          SPRING_DATASOURCE_PASSWORD: password

      - name: Build jar
        run: gradle bootJar --no-daemon

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: user-service-jar
          path: build/libs/*.jar

  docker:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: echo "name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 89.124.106.37
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            docker network create taskspace-net 2>/dev/null || true
            docker pull ghcr.io/ilyayaroslav/user-service:latest

            docker rm -f user-service 2>/dev/null || true

            docker run -d \
              --name user-service \
              --restart unless-stopped \
              --network taskspace-net \
              --add-host=host.docker.internal:host-gateway \
              -p 8082:8081 \
              -e SPRING_DATASOURCE_URL="${{ secrets.USER_SERVICE_DB_URL }}" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.USER_SERVICE_DB_USERNAME }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.USER_SERVICE_DB_PASSWORD }}" \
              -e SECURITY_JWT_SECRET="${{ secrets.USER_SERVICE_JWT_SECRET }}" \
              ghcr.io/ilyayaroslav/user-service:latest

            sleep 10
            curl -fsS http://localhost:8082/api/user-service/v3/api-docs >/dev/null
