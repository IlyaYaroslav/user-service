name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  JAVA_VERSION: '21'
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/ilyayaroslav/user-service

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: users
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d users"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'

      - name: Test
        run: gradle clean test --no-daemon
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/users
          SPRING_DATASOURCE_USERNAME: admin
          SPRING_DATASOURCE_PASSWORD: password

      - name: Build jar
        run: gradle bootJar --no-daemon

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: user-service-jar
          path: build/libs/*.jar

  docker:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: echo "name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: self-hosted
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy with Docker
        env:
          USER_SERVICE_JWT_SECRET: ${{ secrets.USER_SERVICE_JWT_SECRET }}
        run: |
          docker network create taskspace-net 2>/dev/null || true

          if ! docker ps -a --format '{{.Names}}' | grep -qx users-postgres; then
            docker run -d \
              --name users-postgres \
              --restart unless-stopped \
              --network taskspace-net \
              -e POSTGRES_DB=users \
              -e POSTGRES_USER=admin \
              -e POSTGRES_PASSWORD=password \
              -v users_pg_data:/var/lib/postgresql/data \
              postgres:17
          else
            docker start users-postgres
            docker network connect taskspace-net users-postgres 2>/dev/null || true
          fi

          for i in {1..30}; do
            if docker exec users-postgres pg_isready -U admin -d users; then
              break
            fi
            sleep 2
          done

          docker pull "$IMAGE_NAME:latest"
          docker rm -f user-service 2>/dev/null || true

          docker run -d \
            --name user-service \
            --restart unless-stopped \
            --network taskspace-net \
            -p 8082:8081 \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://users-postgres:5432/users \
            -e SPRING_DATASOURCE_USERNAME=admin \
            -e SPRING_DATASOURCE_PASSWORD=password \
            -e SECURITY_JWT_SECRET="${USER_SERVICE_JWT_SECRET:-change-me-change-me-change-me-change-me}" \
            "$IMAGE_NAME:latest"

          for i in {1..30}; do
            if curl -fsS http://localhost:8082/api/user-service/v3/api-docs >/dev/null; then
              docker ps --filter name=user-service
              exit 0
            fi
            sleep 2
          done

          docker logs user-service
          exit 1
